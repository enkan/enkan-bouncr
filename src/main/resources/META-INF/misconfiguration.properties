bouncr.NO_SUCH_JWT_ALGORITHM.problem=JWT algorithm ''{0}'' is not supported.
bouncr.NO_SUCH_JWT_ALGORITHM.solution=Use one of: HS256, HS384, HS512, RS256, RS384, RS512, PS256, PS384, PS512.

bouncr.ALG_NONE_NOT_ALLOWED.problem=JWT algorithm 'none' is not allowed.
bouncr.ALG_NONE_NOT_ALLOWED.solution=Use a signed JWT with a proper algorithm such as RS256 or HS256.

bouncr.NO_SUCH_CRYPTO_PROVIDER.problem=BouncyCastle provider is not registered.
bouncr.NO_SUCH_CRYPTO_PROVIDER.solution=Add Security.addProvider(new BouncyCastleProvider()) before using this component.

bouncr.INVALID_SIGNING_KEY.problem=The private key is invalid or incompatible with the signing algorithm.
bouncr.INVALID_SIGNING_KEY.solution=Check that the key format and algorithm match.

bouncr.AMBIGUOUS_KEY_CONFIG.problem=BouncrBackend is configured with both publicKey (RSA) and key (HMAC).
bouncr.AMBIGUOUS_KEY_CONFIG.solution=Configure either publicKey for RSA verification or key for HMAC, not both.

bouncr.NO_KEY_CONFIGURED.problem=BouncrBackend has no verification key configured (both publicKey and key are null).
bouncr.NO_KEY_CONFIGURED.solution=Call setPublicKey(PublicKey) for RSA or setKey(String/byte[]) for HMAC before using the backend.

bouncr.JWT_COMPONENT_NOT_INJECTED.problem=BouncrBackend.jwt is null — the JsonWebToken component has not been injected.
bouncr.JWT_COMPONENT_NOT_INJECTED.solution=Register JsonWebToken in the EnkanSystem or call setJwt(JsonWebToken) manually.

bouncr.JWT_NOT_STARTED.problem=JsonWebToken component has not been started (mapper is null).
bouncr.JWT_NOT_STARTED.solution=Ensure the EnkanSystem is started before calling sign() or unsign().

bouncr.SIGNING_KEY_IS_NULL.problem=The signing key passed to sign() is null.
bouncr.SIGNING_KEY_IS_NULL.solution=Provide a non-null key (byte[] for HMAC, PrivateKey for RSA/PSS).

bouncr.ALG_KEY_FAMILY_MISMATCH.problem=The JWT header alg family does not match the configured key type.
bouncr.ALG_KEY_FAMILY_MISMATCH.solution=Use an HS* algorithm with a symmetric key, or an RS/PS/ES algorithm with a publicKey.

bouncr.ECDSA_KEY_ALG_MISMATCH.problem=The EC key size does not match the declared JWA algorithm.
bouncr.ECDSA_KEY_ALG_MISMATCH.solution=Use a P-256 key with ES256, P-384 with ES384, or P-521 with ES512.
